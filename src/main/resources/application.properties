# ============================================================
#  MDM Backend — application.properties
#  Database: Aiven PostgreSQL (SSL required)
# ============================================================

# ── Application ─────────────────────────────────────────────
spring.application.name=mdm-backend
spring.main.allow-circular-references=false
spring.web.resources.add-mappings=false

# ── DataSource (Aiven PostgreSQL with SSL) ───────────────────
# ╔══════════════════════════════════════════════════════════════╗
# ║  IMPORTANT: Database credentials                           ║
# ║  Set these via environment variables (DB_URL, DB_USERNAME, ║
# ║  DB_PASSWORD) — for Render deployment, add them in the     ║
# ║  Render dashboard Environment Variables section.           ║
# ║                                                             ║
# ║  The .env file (in .gitignore) contains the real Aiven     ║
# ║  credentials for local development.                        ║
# ║  Defaults below are for development only.                  ║
# ╚══════════════════════════════════════════════════════════════╝
spring.datasource.driver-class-name=org.postgresql.Driver
# URL format: jdbc:postgresql://HOST:PORT/DB?sslmode=require&connectTimeout=30&socketTimeout=60
# ║ For local dev, remove 'sslmode=require' from the URL.
# ║ On Render, set DB_URL env var with 'sslmode=require'.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mdmdb?connectTimeout=30&socketTimeout=60}
spring.datasource.username=${DB_USERNAME:mdmuser}
spring.datasource.password=${DB_PASSWORD:ChangeMeInProduction!}

# HikariCP pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.initialization-fail-timeout=60000

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# ── Flyway ───────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=false
spring.flyway.out-of-order=false
spring.flyway.clean-disabled=true
spring.flyway.table=mdm_schema_history
# Flyway uses the same DB_URL, DB_USERNAME, DB_PASSWORD as the datasource
spring.flyway.url=${DB_URL:jdbc:postgresql://localhost:5432/mdmdb?connectTimeout=30&socketTimeout=60}
spring.flyway.user=${DB_USERNAME:mdmuser}
spring.flyway.password=${DB_PASSWORD:ChangeMeInProduction!}

# ── File upload ──────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ── Server ───────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css,application/javascript
server.tomcat.max-threads=200
server.tomcat.accept-count=100

# ── JWT ──────────────────────────────────────────────────────
# ⚠ CHANGE THIS JWT SECRET for production! Override via JWT_SECRET env variable.
jwt.secret=${JWT_SECRET:MDMSecretKey2024SravanMDMProject!MinLength32CharsRequired}
# 24 hours in milliseconds
jwt.expiration=86400000

# ── MDM file storage & MQTT ──────────────────────────────────
mdm.files-dir=${MDM_FILES_DIR:${java.io.tmpdir}/mdm/files}
mdm.mqtt.broker-url=${MDM_MQTT_BROKER:tcp://localhost:1883}
mdm.mqtt.client-id=mdm-server

# ── CORS ─────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173}

# ── Logging ──────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.hmdm=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=INFO
logging.pattern.console=%d{HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

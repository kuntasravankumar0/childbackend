# ============================================================
#  MDM Backend — application.properties
#  Database: Aiven PostgreSQL (SSL required)
# ============================================================

# ── Application ─────────────────────────────────────────────
spring.application.name=mdm-backend
spring.main.allow-circular-references=false
spring.web.resources.add-mappings=false

# ── DataSource (PostgreSQL) ──────────────────────────────────
# ╔══════════════════════════════════════════════════════════════╗
# ║  Defaults are for local development only.                  ║
# ║  For Render deployment, set these env variables:           ║
# ║    DB_URL, DB_USERNAME, DB_PASSWORD                        ║
# ║                                                             ║
# ║  Production values are set as env vars on Render,          ║
# ║  NOT hardcoded here (security).                            ║
# ╚══════════════════════════════════════════════════════════════╝
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mdmdb?connectTimeout=30&socketTimeout=60}
spring.datasource.username=${DB_USERNAME:mdmuser}
spring.datasource.password=${DB_PASSWORD:ChangeMeInProduction!}

# HikariCP pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.initialization-fail-timeout=60000

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# ── Flyway ───────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=false
spring.flyway.out-of-order=false
spring.flyway.clean-disabled=true
spring.flyway.table=mdm_schema_history
spring.flyway.url=${DB_URL:jdbc:postgresql://localhost:5432/mdmdb?connectTimeout=30&socketTimeout=60}
spring.flyway.user=${DB_USERNAME:mdmuser}
spring.flyway.password=${DB_PASSWORD:ChangeMeInProduction!}

# ── File upload ──────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ── Server ───────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css,application/javascript
server.tomcat.max-threads=200
server.tomcat.accept-count=100

# ── JWT ──────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:MDMSecretKey2024SravanMDMProject!MinLength32CharsRequired}
jwt.expiration=86400000

# ── MDM file storage & MQTT ──────────────────────────────────
mdm.files-dir=${MDM_FILES_DIR:${java.io.tmpdir}/mdm/files}
mdm.mqtt.broker-url=${MDM_MQTT_BROKER:tcp://localhost:1883}
mdm.mqtt.client-id=mdm-server

# ── CORS ─────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173,https://childfrontend-eta.vercel.app}

# ── Google Sheets (contacts/call logs stored in Sheets, read via API key) ──
# ╔════════════════════════════════════════════════════════════════════╗
# ║  NEW DATA FLOW:                                                   ║
# ║  Android APK → Apps Script Web App → Google Sheets (WRITE)        ║
# ║  Backend Admin API → Google Sheets API Key → Google Sheets (READ) ║
# ║                                                                   ║
# ║  Google Sheets is the PRIMARY storage for contacts & call logs.   ║
# ║  PostgreSQL is kept as a fallback for legacy data only.           ║
# ║                                                                   ║
# ║  DO NOT set GOOGLE_SHEETS_CREDENTIALS — org policy blocks it.     ║
# ║  Only set: GOOGLE_SHEETS_SPREADSHEET_ID & GOOGLE_SHEETS_API_KEY   ║
# ╚════════════════════════════════════════════════════════════════════╝
google.sheets.spreadsheet-id=${GOOGLE_SHEETS_SPREADSHEET_ID:1UhmOZUwhG_vBoQrdBCJkezlYAlIEnEGwxqMSUi49h2g}
google.sheets.credentials-json=${GOOGLE_SHEETS_CREDENTIALS:}
google.sheets.api-key=${GOOGLE_SHEETS_API_KEY:AIzaSyC96hhBRhk50tooa9lY9336_gBApqMy1GA}

# ── Storage / Media collection ─────────────────────────────────
mdm.storage-collection-interval=${MDM_STORAGE_INTERVAL:3600}

# ── Logging ──────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.hmdm=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=INFO
logging.pattern.console=%d{HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

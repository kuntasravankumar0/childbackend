# ============================================================
#  MDM Backend — Docker profile overrides
#  Active when: SPRING_PROFILES_ACTIVE=docker
# ============================================================

# Override datasource to use the internal Docker postgres container
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/mdmdb?connectTimeout=30&socketTimeout=60}
spring.datasource.username=${DB_USERNAME:mdmuser}
spring.datasource.password=${DB_PASSWORD:mdmpassword}

spring.flyway.url=${DB_URL:jdbc:postgresql://postgres:5432/mdmdb}
spring.flyway.user=${DB_USERNAME:mdmuser}
spring.flyway.password=${DB_PASSWORD:mdmpassword}

# Override MQTT broker for Docker networking (mosquitto service hostname)
mdm.mqtt.broker-url=${MDM_MQTT_BROKER:tcp://mosquitto:1883}

mdm.files-dir=${MDM_FILES_DIR:/opt/mdm/files}

cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

jwt.secret=${JWT_SECRET:MDMSecretKey2024ChangeThisInProduction!MinLength32Chars}
jwt.expiration=${JWT_EXPIRATION:86400000}

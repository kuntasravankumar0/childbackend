version: '3.9'

# ============================================================
#  MDM Full Stack — docker-compose.yml
#  Usage:  docker compose --env-file .env up --build
# ============================================================

services:

  # ── PostgreSQL Database ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mdm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mdmdb}
      POSTGRES_USER: ${POSTGRES_USER:-mdmuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mdmpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mdmuser} -d ${POSTGRES_DB:-mdmdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mdm-net

  # ── Spring Boot Backend ──────────────────────────────────────
  backend:
    build: .
    container_name: mdm-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-mdmdb}
      POSTGRES_USER: ${POSTGRES_USER:-mdmuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mdmpassword}
      MDM_FILES_DIR: /opt/mdm/files
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      MDM_MQTT_BROKER: ${MDM_MQTT_BROKER:-tcp://mosquitto:1883}
      JWT_SECRET: ${JWT_SECRET:-MDMSecretKeyChangeThisInProduction32Chars}
    volumes:
      - mdmfiles:/opt/mdm/files
    ports:
      - "8080:8080"
    networks:
      - mdm-net

  # ── MQTT Broker (optional — only needed if using mqttWorker push) ──
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mdm-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqttdata:/mosquitto/data
    networks:
      - mdm-net

volumes:
  pgdata:
  mdmfiles:
  mqttdata:

networks:
  mdm-net:
    driver: bridge
